<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Page introuvable — EYE-FONCIER</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
               background: #f4f7f6; color: #374151; min-height: 100vh;
               display: flex; align-items: center; justify-content: center; }
        .container { text-align: center; padding: 40px 20px; max-width: 500px; }
        .code { font-size: 120px; font-weight: 800; color: #0B3D2E; line-height: 1; }
        .bar { width: 80px; height: 4px; margin: 20px auto;
               background: linear-gradient(90deg, #E8790A, #16a34a); border-radius: 2px; }
        h1 { font-size: 24px; color: #0B3D2E; margin-bottom: 12px; }
        p { font-size: 15px; line-height: 1.6; color: #6b7280; margin-bottom: 28px; }
        .btn { display: inline-block; padding: 12px 32px; background: #16a34a;
               color: #fff; text-decoration: none; border-radius: 8px;
               font-weight: 600; font-size: 14px; transition: background 0.2s; }
        .btn:hover { background: #15803d; }
    </style>
</head>
<body>
    <div class="container">
        <div class="code">404</div>
        <div class="bar"></div>
        <h1>Page introuvable</h1>
        <p>La page que vous recherchez n'existe pas ou a ete deplacee.
           Verifiez l'URL ou retournez a l'accueil.</p>
        <a href="/" class="btn">Retour a l'accueil</a>
    </div>
</body>
</html>
